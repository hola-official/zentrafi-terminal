name: Deploy CDN

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CDN bundle
        run: npm run build:cdn
        # Produces:  dist/cdn/main.js
        #            dist/cdn/main.js.map
        #            dist/cdn/style.css

      # ── Option A: Cloudflare R2 (recommended for DeFi — zero egress) ──────────
      # Prerequisites in Cloudflare:
      #   1. Create an R2 bucket, e.g. "zentrafi-cdn"
      #   2. Connect a custom domain: cdn.zentrafi.xyz → bucket
      #   3. Create an API token with "R2:Edit" permission
      # Secrets to add in GitHub repo → Settings → Secrets:
      #   CLOUDFLARE_ACCOUNT_ID   your Cloudflare account ID
      #   CLOUDFLARE_R2_TOKEN     the API token you created
      - name: Upload to Cloudflare R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_R2_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: r2 object put zentrafi-cdn/terminal/main.js     --file dist/cdn/main.js     --content-type application/javascript
      - name: Upload style to Cloudflare R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_R2_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: r2 object put zentrafi-cdn/terminal/style.css   --file dist/cdn/style.css   --content-type text/css
      - name: Upload sourcemap to Cloudflare R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_R2_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: r2 object put zentrafi-cdn/terminal/main.js.map --file dist/cdn/main.js.map --content-type application/json

      # ── Option B: AWS S3 + CloudFront ─────────────────────────────────────────
      # Uncomment and remove Option A if you prefer S3.
      # Secrets needed:  AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION
      # Variables needed: S3_BUCKET (e.g. "zentrafi-cdn"), CF_DISTRIBUTION_ID
      #
      # - name: Upload to S3
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: ${{ secrets.AWS_REGION }}
      #
      # - run: |
      #     aws s3 cp dist/cdn/main.js     s3://${{ vars.S3_BUCKET }}/terminal/main.js     --content-type application/javascript --cache-control "public, max-age=31536000, immutable"
      #     aws s3 cp dist/cdn/style.css   s3://${{ vars.S3_BUCKET }}/terminal/style.css   --content-type text/css               --cache-control "public, max-age=31536000, immutable"
      #     aws s3 cp dist/cdn/main.js.map s3://${{ vars.S3_BUCKET }}/terminal/main.js.map --content-type application/json       --cache-control "public, max-age=31536000, immutable"
